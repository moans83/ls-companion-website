<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LS Companion</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #f4eef5;
      --text: #2f2238;
      --muted: #6f5b7d;
      --accent: #b882d9;
      --accent-dark: #8f63b2;
      --button-text: #ffffff;
      --border: #e4dce8;
      --input-bg: #ffffff;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .header {
      padding: 20px 24px;
    }

    .header img {
      width: 80px;
      height: auto;
      display: block;
    }

    .hero {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 24px 36px;
      text-align: center;
    }

    .hero-inner {
      max-width: 760px;
      width: 100%;
    }

    h1 {
      margin: 0 0 18px;
      font-family: 'Playfair Display', serif;
      font-size: clamp(44px, 8vw, 72px);
      line-height: 0.98;
      font-weight: 600;
      letter-spacing: -0.02em;
    }

    .subhead {
      margin: 0 auto 34px;
      max-width: 620px;
      color: var(--muted);
      font-size: clamp(20px, 2.5vw, 28px);
      line-height: 1.45;
    }

    .logo-wrap {
      margin: 0 auto 34px;
    }

    .logo-wrap img {
      width: min(180px, 42vw);
      height: auto;
      display: block;
      margin: 0 auto;
    }

    .signup-form {
      max-width: 620px;
      margin: 0 auto;
    }

    .form-row {
      display: flex;
      gap: 14px;
      justify-content: center;
      align-items: stretch;
      flex-wrap: wrap;
    }

    .email-input {
      flex: 1 1 320px;
      min-width: 260px;
      padding: 18px 20px;
      border-radius: 18px;
      border: 1px solid var(--border);
      background: var(--input-bg);
      font-size: 18px;
      color: var(--text);
      outline: none;
      box-shadow: 0 4px 14px rgba(143, 99, 178, 0.06);
    }

    .email-input::placeholder {
      color: #9a8aa6;
    }

    .email-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 4px rgba(184, 130, 217, 0.15);
    }

    .cta {
      border: none;
      background: linear-gradient(135deg, var(--accent), var(--accent-dark));
      color: var(--button-text);
      font-weight: 700;
      font-size: 22px;
      padding: 20px 34px;
      border-radius: 18px;
      box-shadow: 0 10px 24px rgba(143, 99, 178, 0.22);
      cursor: pointer;
      min-width: 220px;
    }

    .cta-note {
      margin-top: 16px;
      color: var(--muted);
      font-size: 16px;
    }

    .footer {
      padding: 20px 24px 30px;
      text-align: center;
    }

    .footer a {
      color: var(--accent-dark);
      text-decoration: none;
      font-weight: 500;
      margin: 0 16px;
    }

    .footer a:hover,
    .cta:hover {
      opacity: 0.92;
    }

    @media (max-width: 640px) {
      .header img {
        width: 60px;
      }

      .logo-wrap img {
        width: min(150px, 46vw);
      }

      .form-row {
        flex-direction: column;
      }

      .email-input,
      .cta {
        width: 100%;
        min-width: 0;
      }

      .cta {
        font-size: 20px;
        padding: 18px 24px;
      }
    }
  </style>
</head>

<body>

  <div class="header">
    <img src="logo.png" alt="LS Companion logo" />
  </div>

  <main class="hero">
    <div class="hero-inner">

      <h1>LS Companion</h1>

      <p class="subhead">
        A calm, simple way to track symptoms, treatment, and patterns with lichen sclerosus.
      </p>

      <div class="logo-wrap">
        <img src="logo.png" alt="LS Companion logo" />
      </div>

      <form
        class="signup-form"
        action="https://docs.google.com/forms/d/e/1FAIpQLSddbM3r8sfMMAai2gkbggF8HeL3aDgqayX8Nm5RIv9uljPNCA/formResponse"
        method="POST"
        target="_blank"
      >
        <div class="form-row">
          <input
            class="email-input"
            type="email"
            name="entry.340076253"
            placeholder="Enter your email"
            required
          />
          <button class="cta" type="submit">Join Early Access</button>
        </div>
      </form>

      <div class="cta-note">
        Mostly free. Looking for a few pilot testers.
      </div>

    </div>
  </main>

  <footer class="footer">
    <a href="#">Privacy Policy</a>
    <a href="#">Terms of Use</a>
  </footer>

</body>
</html>
