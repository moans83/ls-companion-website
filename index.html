<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>LS Companion</title>

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: #1a1024; /* dark plum */
      color: #f3e8ff;
      text-align: center;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 420px;
    }

    img {
      width: 90px;
      margin-bottom: 20px;
    }

    h1 {
      font-size: 28px;
      margin-bottom: 10px;
      font-weight: 600;
    }

    p {
      color: #c4b5fd;
      font-size: 16px;
      line-height: 1.5;
      margin-bottom: 30px;
    }

    .button {
      display: inline-block;
      padding: 14px 24px;
      border-radius: 12px;
      background: #e9d5ff;
      color: #1a1024;
      font-weight: 600;
      text-decoration: none;
      transition: 0.2s ease;
    }

    .button:hover {
      background: #d8b4fe;
    }

    .sub {
      margin-top: 20px;
      font-size: 13px;
      color: #a78bfa;
    }
  </style>
</head>

<body>

  <div class="container">

    <!-- Optional: add your logo file later -->
    <!-- <img src="logo.jpg" alt="LS Companion Logo" /> -->

    <h1>LS Companion</h1>

    <p>
      A simple daily check-in for lichen sclerosus.<br><br>
      Track symptoms, treatments, and patterns — without overwhelm.
    </p>

    <a 
      href="https://docs.google.com/forms/d/e/1FAIpQLSddbM3r8sfMMAai2gkbggF8HeL3aDgqayX8Nm5RIv9uljPNCA/viewform?usp=sf_link" 
      target="_blank" 
      class="button">
      Join early access
    </a>

    <div class="sub">
      Private. No spam. Just early access.
    </div>

  </div>

</body>
</html>
