<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LS Companion</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #f4eef5;
      --text: #2f2238;
      --muted: #6f5b7d;
      --accent-dark: #1c1326;
      --accent-dark-hover: #2a1a38;
      --button-text: #ffffff;
      --border: #e4dce8;
      --input-bg: #ffffff;
      --soft-accent: #8f63b2;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: 'Manrope', -apple-system, BlinkMacSystemFont, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .page {
      width: 100%;
      max-width: 1120px;
      margin: 0 auto;
      padding: 40px 28px 24px;
      flex: 1;
      display: flex;
      align-items: center;
    }

    .hero {
      width: 100%;
      display: grid;
      grid-template-columns: minmax(0, 0.9fr) minmax(320px, 430px);
      gap: 28px;
      align-items: center;
    }

    .hero-copy {
      text-align: left;
      max-width: 520px;
    }

    .eyebrow {
      margin: 0 0 14px;
      color: var(--soft-accent);
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0 0 18px;
      font-size: clamp(46px, 6vw, 72px);
      line-height: 0.98;
      font-weight: 800;
      letter-spacing: -0.05em;
    }

    .subhead {
      margin: 0 0 26px;
      color: var(--muted);
      font-size: clamp(20px, 2vw, 28px);
      font-weight: 500;
      line-height: 1.42;
      max-width: 500px;
    }

    .signup-form {
      width: 100%;
      max-width: 560px;
      margin-top: 6px;
    }

    .form-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 12px;
      width: 100%;
      align-items: stretch;
    }

    .email-input {
      width: 100%;
      min-width: 0;
      padding: 18px 20px;
      border-radius: 18px;
      border: 1px solid var(--border);
      background: var(--input-bg);
      font-size: 18px;
      font-weight: 500;
      color: var(--text);
      outline: none;
      box-shadow: 0 4px 14px rgba(143, 99, 178, 0.06);
    }

    .email-input::placeholder {
      color: #9a8aa6;
    }

    .email-input:focus {
      border-color: #b882d9;
      box-shadow: 0 0 0 4px rgba(184, 130, 217, 0.15);
    }

    .cta {
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: #1c1326;
      color: #ffffff;
      font-weight: 500;
      font-size: 21px;
      padding: 20px 28px;
      border-radius: 18px;
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.22);
      cursor: pointer;
      min-width: 205px;
      transition: all 0.15s ease;
      white-space: nowrap;
    }

    .cta:hover {
      background: #2a1a38;
    }

    .hero-image {
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .hero-image img {
      width: 100%;
      max-width: 460px;
      height: auto;
      display: block;
      filter: drop-shadow(0 26px 34px rgba(72, 42, 99, 0.10));
    }

    .footer {
      border-top: 1px solid rgba(0,0,0,0.05);
      padding: 16px 24px 28px;
      text-align: center;
    }

    .footer a {
      color: #8f63b2;
      text-decoration: none;
      font-weight: 600;
      margin: 0 14px;
      font-size: 14px;
    }

    .footer a:hover {
      opacity: 0.9;
    }

    @media (max-width: 980px) {
      .hero {
        grid-template-columns: 1fr;
      }

      .hero-copy {
        text-align: center;
      }

      .hero-image {
        order: 2;
      }

      .hero-image img {
        max-width: 340px;
      }
    }

    @media (max-width: 640px) {
      .form-row {
        grid-template-columns: 1fr;
      }

      .cta {
        width: 100%;
      }

      .hero-image img {
        max-width: 280px;
      }
    }
  </style>
</head>

<body>

  <main class="page">
    <section class="hero">

      <div class="hero-copy">
        <h1>LS Companion</h1>

        <p class="subhead">
          A calm, simple way to track symptoms, treatment, and patterns for those of us with Lichen Sclerosus.
        </p>

        <form
          class="signup-form"
          action="https://docs.google.com/forms/d/e/1FAIpQLSddbM3r8sfMMAai2gkbggF8HeL3aDgqayX8Nm5RIv9uljPNCA/formResponse"
          method="POST"
          target="_blank"
        >
          <div class="form-row">
            <input
              class="email-input"
              type="email"
              name="entry.340076253"
              placeholder="Enter your email"
              required
            />
            <button class="cta" type="submit">Join Early Access</button>
          </div>
        </form>
      </div>

      <div class="hero-image">
        <img src="screenshot.png" alt="LS Companion app screenshot" />
      </div>

    </section>
  </main>

  <!-- ✅ CORRECT placement -->
  <footer class="footer">
    <a href="/privacy.html">Privacy Policy</a>
    <a href="/terms.html">Terms of Use</a>
  </footer>

</body>
</html>
