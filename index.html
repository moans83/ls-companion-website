<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LS Companion</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #ffffff;
      --text: #2f2238;
      --muted: #6f5b7d;
      --accent-dark: #1c1326;
      --accent-dark-hover: #2a1a38;
      --button-text: #ffffff;
      --border: #e4dce8;
      --input-bg: #ffffff;
      --soft-accent: #8f63b2;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: 'Manrope', -apple-system, BlinkMacSystemFont, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .page {
      width: 100%;
      max-width: 1120px;
      margin: 0 auto;
      padding: 40px 28px 24px;
      flex: 1;
      display: flex;
      align-items: center;
    }

    .hero {
      width: 100%;
      display: grid;
      grid-template-columns: minmax(0, 0.9fr) minmax(320px, 430px);
      grid-template-areas:
        "copy image"
        "form image";
      gap: 28px;
      align-items: center;
    }

    .hero-copy {
      grid-area: copy;
      text-align: left;
      max-width: 520px;
    }

    .hero-form {
      grid-area: form;
      max-width: 560px;
    }

    .hero-image {
      grid-area: image;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .eyebrow {
      margin: 0 0 14px;
      color: var(--soft-accent);
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0 0 18px;
      font-size: clamp(46px, 6vw, 72px);
      line-height: 0.98;
      font-weight: 800;
      letter-spacing: -0.05em;
    }

    .subhead {
      margin: 0 0 26px;
      color: var(--muted);
      font-size: clamp(20px, 2vw, 28px);
      font-weight: 500;
      line-height: 1.42;
      max-width: 500px;
    }

    .signup-form {
      width: 100%;
      max-width: 560px;
      margin-top: 6px;
    }

    .form-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 12px;
      width: 100%;
      align-items: stretch;
    }

    .email-input {
      width: 100%;
      min-width: 0;
      padding: 18px 20px;
      border-radius: 18px;
      border: 1px solid var(--border);
      background: var(--input-bg);
      font-family: 'Manrope', -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 18px;
      font-weight: 500;
      color: var(--text);
      outline: none;
      box-shadow: 0 4px 14px rgba(143, 99, 178, 0.06);
    }

    .email-input::placeholder {
      color: #9a8aa6;
    }

    .email-input:focus {
      border-color: #b882d9;
      box-shadow: 0 0 0 4px rgba(184, 130, 217, 0.15);
    }

    .cta {
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: #1c1326;
      color: #ffffff;
      font-family: 'Manrope', -apple-system, BlinkMacSystemFont, sans-serif;
      font-weight: 500;
      font-size: 21px;
      padding: 20px 28px;
      border-radius: 18px;
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.22);
      cursor: pointer;
      min-width: 205px;
      transition: all 0.15s ease;
      white-space: nowrap;
    }

    .cta:hover {
      background: #2a1a38;
    }

    .cta-note {
      margin-top: 14px;
      color: var(--muted);
      font-size: 15px;
      font-weight: 500;
    }

    .hero-image img {
      width: 100%;
      max-width: 460px;
      height: auto;
      display: block;
      filter: drop-shadow(0 26px 34px rgba(72, 42, 99, 0.10));
    }

    .thank-you-card {
      background: #ffffff;
      border: 1px solid var(--border);
      border-radius: 22px;
      padding: 28px 24px;
      box-shadow: 0 8px 24px rgba(143, 99, 178, 0.08);
      text-align: left;
    }

    .thank-you-card h2 {
      margin: 0 0 10px;
      font-size: 28px;
      line-height: 1.1;
      font-weight: 800;
      color: var(--text);
    }

    .thank-you-card p {
      margin: 0;
      font-size: 18px;
      line-height: 1.5;
      color: var(--muted);
    }

    .footer {
      padding: 8px 24px 24px;
      text-align: center;
    }

    .footer a {
      color: #8f63b2;
      text-decoration: none;
      font-weight: 600;
      margin: 0 16px;
      font-size: 15px;
    }

    .footer a:hover {
      opacity: 0.92;
    }

    @media (max-width: 980px) {
      .page {
        max-width: 760px;
        padding: 32px 22px 20px;
      }

      .hero {
        grid-template-columns: 1fr;
        grid-template-areas:
          "copy"
          "image"
          "form";
        gap: 28px;
      }

      .hero-copy,
      .hero-form {
        max-width: 100%;
        text-align: center;
        margin: 0 auto;
      }

      .subhead,
      .cta-note {
        margin-left: auto;
        margin-right: auto;
      }

      .hero-image img {
        max-width: 340px;
      }

      .thank-you-card {
        text-align: center;
      }
    }

    @media (max-width: 640px) {
      .page {
        padding: 24px 18px 18px;
      }

      .form-row {
        grid-template-columns: 1fr;
      }

      .cta {
        width: 100%;
        min-width: 0;
        font-size: 20px;
        padding: 18px 24px;
      }

      .hero-image img {
        max-width: 280px;
      }

      .footer a {
        margin: 0 10px;
      }
    }
  </style>
</head>

<body>

  <main class="page">
    <section class="hero">

      <div class="hero-copy">
        <p class="eyebrow">Early access</p>

        <h1>LS Companion</h1>

        <p class="subhead">
          A calm, simple way to track symptoms, treatment, and patterns for those of us with Lichen Sclerosus.
        </p>
      </div>

      <div class="hero-image">
        <img src="screenshot2.png" alt="LS Companion app screenshot" />
      </div>

      <div class="hero-form">
        <form
          class="signup-form"
          action="https://docs.google.com/forms/d/e/1FAIpQLSddbM3r8sfMMAai2gkbggF8HeL3aDgqayX8Nm5RIv9uljPNCA/formResponse"
          method="POST"
          target="hidden_iframe"
          onsubmit="submitted=true;"
        >
          <div class="form-row">
            <input
              class="email-input"
              type="email"
              name="entry.340076253"
              placeholder="Enter your email"
              required
            />
            <button class="cta" type="submit">Join Early Access</button>
          </div>
        </form>

        <div class="cta-note">
          Looking for a few pilot testers to help shape the app.
        </div>
      </div>

    </section>
  </main>

  <footer class="footer">
  <a href="/privacy.html">Privacy Policy</a>
  <a href="/terms.html">Terms of Use</a>  </footer>

  <iframe name="hidden_iframe" id="hidden_iframe" style="display:none;"></iframe>

  <script>
    let submitted = false;

    document.getElementById('hidden_iframe').addEventListener('load', function () {
      if (submitted) {
        document.querySelector('.hero-form').innerHTML = `
          <div class="thank-you-card">
            <h2>Thank you 💛</h2>
            <p>You’re on the early access list. I’ll let you know when the app is ready. In the meantime, if you have questions you can reach me (Mona) at support@lscompanion.com.</p>
          </div>
        `;
      }
    });
  </script>

</body>
</html>
